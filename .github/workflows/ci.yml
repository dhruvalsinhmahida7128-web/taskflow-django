name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install coverage flake8

    - name: Run migrations
      run: |
        python manage.py makemigrations
        python manage.py migrate

    - name: Run flake8 linting
      run: flake8 tasks/ --max-line-length=120 --exclude=migrations

    - name: Run tests with coverage
      run: |
        coverage run manage.py test tasks
        coverage report -m

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: .coverage
        retention-days: 7

    - name: Test Summary
      run: |
        echo "All tests passed!"
        echo "Coverage report generated"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Deploy to Render
      env:
        RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      run: |
        if [ -n "$RENDER_API_KEY" ] && [ -n "$RENDER_SERVICE_ID" ]; then
          curl -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json"
          echo "Deployment triggered on Render!"
        else
          echo "Render secrets not configured - skipping automatic deployment!"
          echo "To enable automatic deployment:"
          echo "  1. Go to GitHub repository → Settings → Secrets and variables → Actions"
          echo "  2. Add RENDER_API_KEY and RENDER_SERVICE_ID secrets"
        fi