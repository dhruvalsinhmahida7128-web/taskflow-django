{% extends 'tasks/base.html' %}
{% block title %}Delete Project{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header bg-danger text-white"><h3>Confirm Delete</h3></div>
    <div class="card-body">
        <p>Are you sure you want to delete project <strong>"{{ project.name }}"</strong>? This will also delete all tasks in this project.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'project_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
